events {}

http {
    upstream app {
        # Importante: estos nombres deben coincidir con los servicios del docker-compose
        server blue:3000 weight=8;
        server green:3000 weight=2;
    }

    server {
        listen 80;

        location / {
            proxy_pass         http://app;
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            # Esto te ayudará a ver en las capturas qué contenedor responde
            add_header         X-Upstream         $upstream_addr always;
        }

        location /health {
            proxy_pass http://app/health;
        }
    }
}