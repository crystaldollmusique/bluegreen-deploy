version: '3.8'

services:
  blue:
    build:
      context: ./app
    container_name: app_blue
    environment:
      - APP_COLOR=blue
      - APP_VERSION=1.0.0
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  green:
    build:
      context: ./app
    container_name: app_green
    environment:
      - APP_COLOR=green
      - APP_VERSION=2.0.0
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    container_name: nginx_lb
    ports:
      - "8080:80"
    depends_on:
      - blue
      - green
    networks:
      - appnet
    restart: unless-stopped

networks:
  appnet:
    driver: bridge